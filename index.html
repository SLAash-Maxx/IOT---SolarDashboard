<!DOCTYPE html>
<html>
<head>
    <title>Solar Monitoring Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <h2>Solar Monitoring System</h2>

    <div class="card">
        <h3>Solar Voltage</h3>
        <p id="solar-voltage">0.00 V</p>
    </div>

    <div class="card">
        <h3>Load Current</h3>
        <p id="load-current">0.000 A</p>
    </div>

    <div class="card">
        <h3>Temperature</h3>
        <p id="temp">0.0 °C</p>
    </div>

    <div class="card">
        <h3>System Control</h3>
        <button id="relay-btn" onclick="toggleRelay()">Turn ON</button>
        <p>Status: <span id="relay-status">OFF</span></p>
    </div>

    <script>
        // Your Firebase Configuration (මතක ඇතුව මේක දාන්න)
        const firebaseConfig = {
            databaseURL: "https://project-solar-c2245-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Solar Voltage Update
        database.ref('/Solar/Voltage').on('value', (snapshot) => {
            document.getElementById('solar-voltage').innerText = snapshot.val() + " V";
        });

        // Load Current Update
        database.ref('/Load/Current').on('value', (snapshot) => {
            document.getElementById('load-current').innerText = snapshot.val() + " A";
        });

        // Temperature Update
        database.ref('/Battery/Temperature').on('value', (snapshot) => {
            document.getElementById('temp').innerText = snapshot.val() + " °C";
        });

        // Relay Control Logic
        let currentRelayState = false;
        database.ref('/Control/Relay').on('value', (snapshot) => {
            currentRelayState = snapshot.val();
            const btn = document.getElementById('relay-btn');
            const status = document.getElementById('relay-status');
            
            if(currentRelayState) {
                btn.innerText = "Turn OFF";
                status.innerText = "ON";
                status.style.color = "green";
            } else {
                btn.innerText = "Turn ON";
                status.innerText = "OFF";
                status.style.color = "red";
            }
        });

        function toggleRelay() {
            database.ref('/Control/Relay').set(!currentRelayState);
        }
    </script>

</body>
</html>
